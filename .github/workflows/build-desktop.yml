name: Build Desktop

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-cache:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: test-cache-dir
          key: cache-test-v1

      - name: Cache status
        shell: bash
        run: |
          echo "Cache hit: ${{ steps.cache-restore.outputs.cache-hit }}"
          if [ -d test-cache-dir ]; then
            echo "Contents:"
            ls -la test-cache-dir/
            cat test-cache-dir/hello.txt
          else
            echo "No cache dir found"
          fi

      - name: Create test data (only on cache miss)
        if: steps.cache-restore.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p test-cache-dir
          echo "cached at $(date)" > test-cache-dir/hello.txt
          echo "Created test data"
          cat test-cache-dir/hello.txt

      - name: Save cache
        if: steps.cache-restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: test-cache-dir
          key: cache-test-v1
